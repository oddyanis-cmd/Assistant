<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sign in — Katara Members</title>
<style>
  body{margin:0;font-family:-apple-system,Helvetica,Arial,sans-serif;
    background:#49153B;display:flex;min-height:100vh;align-items:center;
    justify-content:center}
  .box{background:#fff;border-radius:12px;padding:28px;width:320px;
    box-shadow:0 10px 40px rgba(0,0,0,.3)}
  h1{color:#49153B;font-size:20px;margin:0 0 4px;text-align:center;letter-spacing:.5px}
  p.sub{color:#888;font-size:12px;text-align:center;margin:0 0 18px}
  label{font-size:12px;color:#666;display:block;margin:10px 0 3px}
  input{width:100%;padding:10px;border:1px solid #ccc;border-radius:8px;font-size:14px}
  button{width:100%;margin-top:18px;background:#49153B;color:#fff;border:0;
    padding:11px;border-radius:8px;font-size:15px;font-weight:bold;cursor:pointer}
  .err{background:#fdecea;color:#b3261e;font-size:13px;padding:8px 10px;
    border-radius:8px;margin-bottom:8px;text-align:center}
</style>
</head>
<body>
  <form class="box" method="post">
    <h1>KATARA · Members</h1>
    <p class="sub">Please sign in to continue</p>
    {% if error %}<div class="err">{{ error }}</div>{% endif %}
    <label>Username</label>
    <input name="username" autofocus autocomplete="username">
    <label>Password</label>
    <input name="password" type="password" autocomplete="current-password">
    <button type="submit">Sign in</button>
  </form>
</body>
</html>
