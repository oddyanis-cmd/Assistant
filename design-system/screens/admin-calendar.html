<!DOCTYPE html>
<!--
  ─────────────────────────────────────────────────────────────────
  BELZA SALON — Screen (f): Admin Appointments Calendar (Week View)
  Author: Dana (Designer)
  ─────────────────────────────────────────────────────────────────
  Implementation notes:
  - Calendar grid: CSS Grid with time slots on Y-axis, days on X-axis.
  - Each column = 1 day. Each row = 30min. Total rows = 22 (08:00-19:00).
  - Event chips are absolutely positioned within their day column.
  - Use react-big-calendar or FullCalendar as the base component,
    then apply our custom styles via the className prop / CSS overrides.
  - Alternatively build custom using CSS Grid:
      grid-template-rows: repeat(22, 48px)  (48px per 30min slot)
  - Event height = (duration_minutes / 30) * 48px
  - Event top = ((start_minutes_from_08:00) / 30) * 48px
  ─────────────────────────────────────────────────────────────────
-->

            border:     { DEFAULT:'#e8ddd9', strong:'#cfc4bf', subtle:'#f0ebe8' },

          borderRadius: { card:'16px', pill:'999px' },
          boxShadow: {
            card:'0 2px 8px 0 rgba(44,34,32,0.08)',
            topbar:'0 1px 0 0 rgba(44,34,32,0.08)',

        }
      }
    }
  </script>
  <style>
    body { background-color: #faf8f6; color: #2c2220; font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
    .font-display { font-family: 'Playfair Display', serif; }
    :focus-visible { outline: 2px solid #d4614f; outline-offset: 2px; border-radius: 4px; }
    :focus:not(:focus-visible) { outline: none; }

    /* ── Calendar grid ───────────────────────────────── */
    /*
     * The calendar is a CSS grid:
     * - 1 column for time labels (48px wide)
     * - 6 columns for days (Mon-Sat), equal width
     * - Rows: 1 header + 22 half-hour slots (08:00–19:00)
     * - Each slot = 48px tall
     *
     * Events are positioned absolutely within each day column
     * using top/height calculated from start time and duration.
     */
    .cal-grid {
      display: grid;
      grid-template-columns: 52px repeat(6, 1fr);
      grid-auto-rows: 48px;
      position: relative;
    }
    .cal-header-row {
      display: contents;
    }
    .cal-time-col {
      grid-column: 1;
      display: flex;
      align-items: flex-start;
      justify-content: flex-end;
      padding-right: 8px;
      padding-top: 2px;
      font-size: 11px;
      color: #9c8e88;
      font-weight: 500;
      position: relative;
      z-index: 1;
    }
    .cal-slot {
      border-top: 1px solid #f0ebe8;
      position: relative;
    }
    .cal-slot:nth-child(even) {
      border-top: 1px dashed #f0ebe8;
    }
    /* Day columns */
    .cal-day-col {
      position: relative;
      border-left: 1px solid #f0ebe8;
    }
    /* Event chip — absolutely positioned */
    .cal-event {
      position: absolute;
      left: 4px;
      right: 4px;
      border-radius: 8px;
      padding: 6px 8px;
      overflow: hidden;
      cursor: pointer;
      box-shadow: 0 1px 3px 0 rgba(44,34,32,0.10);
      transition: box-shadow 0.15s, transform 0.15s;
      border-left-width: 3px;
      border-left-style: solid;
    }
    .cal-event:hover {
      box-shadow: 0 4px 12px -2px rgba(44,34,32,0.18);
      transform: translateX(1px);
      z-index: 10;
    }
    .cal-event:focus-visible {
      outline: 2px solid #d4614f;
      outline-offset: 2px;
    }
    /* Current time indicator */
    .now-line {
      position: absolute;
      left: 0; right: 0;
      height: 2px;
      background: #d4614f;
      z-index: 20;
    }
    .now-line::before {
      content: '';
      position: absolute;
      left: -4px;
      top: -4px;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #d4614f;
    }
  </style>
</head>
