<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shiny Beauty Center — Book Appointment</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            rose:    { 50:"#fff1f2",100:"#ffe4e6",200:"#fecdd3",300:"#fda4af",400:"#fb7185",500:"#f43f5e",600:"#e11d48" },
            blush:   { 50:"#fef7f0",100:"#fdeee0" },
            nude:    { 50:"#fdf8f6",100:"#f9ede8",200:"#f2d9d0",300:"#e8bfb0",400:"#d99f8b" },
            cream:   { 50:"#fefdfb",100:"#fdf8f0" },
            charcoal:{ 50:"#f6f6f7",100:"#e2e3e6",400:"#7c7e89",500:"#62636e",600:"#4e4f5a",700:"#41424b",800:"#37383f",900:"#2d2e35" },
          },
          fontFamily: { sans:["Inter","system-ui","sans-serif"] }
        }
      }
    }
  </script>
  <style>body { font-family: 'Inter', system-ui, sans-serif; } .scrollbar-none::-webkit-scrollbar{display:none;}</style>
</head>
<body class="bg-cream-50 text-charcoal-900 min-h-screen">

<!-- Header -->
<header class="sticky top-0 z-30 bg-white/95 backdrop-blur-sm border-b border-nude-100 px-4 py-3 flex items-center justify-between">
  <div class="flex items-center gap-2">
    <svg width="28" height="28" viewBox="0 0 36 36" fill="none"><circle cx="18" cy="18" r="17" stroke="#fda4af" stroke-width="1.5"/><path d="M18 8 C13 8, 9 12, 9 18 C9 24, 13 28, 18 28" stroke="#f43f5e" stroke-width="2" stroke-linecap="round" fill="none"/><path d="M18 8 C23 8, 27 12, 27 18 C27 24, 23 28, 18 28" stroke="#fda4af" stroke-width="2" stroke-linecap="round" fill="none"/><circle cx="18" cy="18" r="3" fill="#f43f5e" opacity="0.7"/></svg>
    <span class="text-lg font-light text-charcoal-900">Shiny <em class="text-rose-500 not-italic">Beauty</em></span>
  </div>
</header>

<main class="max-w-lg mx-auto px-4 pt-6 pb-24">
  <h1 class="text-2xl font-light text-charcoal-900 mb-6">Book Appointment</h1>

  <!-- Step bar -->
  <div class="flex items-center mb-8">
    <!-- Step 1: Service (done) -->
    <div class="flex items-center flex-1">
      <div class="w-7 h-7 rounded-full flex items-center justify-center text-xs font-semibold bg-rose-500 text-white flex-shrink-0">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 6l3 3 5-5" stroke="white" stroke-width="1.8" stroke-linecap="round"/></svg>
      </div>
      <span class="text-[10px] ms-1 font-medium text-charcoal-400 hidden sm:inline">Service</span>
      <div class="flex-1 h-px mx-2 bg-rose-300"></div>
    </div>
    <!-- Step 2: Staff (done) -->
    <div class="flex items-center flex-1">
      <div class="w-7 h-7 rounded-full flex items-center justify-center text-xs font-semibold bg-rose-500 text-white flex-shrink-0">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 6l3 3 5-5" stroke="white" stroke-width="1.8" stroke-linecap="round"/></svg>
      </div>
      <span class="text-[10px] ms-1 font-medium text-charcoal-400 hidden sm:inline">Specialist</span>
      <div class="flex-1 h-px mx-2 bg-rose-300"></div>
    </div>
    <!-- Step 3: Date & Time (active) -->
    <div class="flex items-center flex-1">
      <div class="w-7 h-7 rounded-full flex items-center justify-center text-xs font-semibold bg-rose-500 text-white flex-shrink-0">3</div>
      <span class="text-[10px] ms-1 font-medium text-rose-600 hidden sm:inline">Date &amp; Time</span>
      <div class="flex-1 h-px mx-2 bg-nude-200"></div>
    </div>
    <!-- Step 4: Confirm -->
    <div class="flex items-center">
      <div class="w-7 h-7 rounded-full flex items-center justify-center text-xs font-semibold bg-nude-100 text-charcoal-400 flex-shrink-0">4</div>
      <span class="text-[10px] ms-1 font-medium text-charcoal-400 hidden sm:inline">Confirm</span>
    </div>
  </div>

  <!-- Selected service summary banner -->
  <div class="bg-rose-50 border border-rose-100 rounded-xl p-3 mb-6 flex items-center justify-between">
    <div>
      <p class="text-xs text-charcoal-400">Selected Service</p>
      <p class="font-medium text-charcoal-800">Swedish Relaxation Massage</p>
    </div>
    <div class="text-right">
      <p class="text-xs text-charcoal-400">with</p>
      <div class="flex items-center gap-1.5">
        <div class="w-6 h-6 rounded-full bg-rose-300 flex items-center justify-center text-white text-xs font-bold">L</div>
        <p class="text-sm font-medium text-charcoal-800">Layla</p>
      </div>
    </div>
  </div>

  <!-- Date picker -->
  <div class="mb-6">
    <h2 class="text-sm font-semibold text-charcoal-700 mb-3">Choose a Date</h2>
    <div class="flex gap-2 overflow-x-auto pb-1 scrollbar-none -mx-4 px-4">
      <button class="flex-shrink-0 px-3 py-2 rounded-xl border text-sm bg-white border-nude-200 text-charcoal-700">Mon, Jun 30</button>
      <button class="flex-shrink-0 px-3 py-2 rounded-xl border text-sm bg-rose-500 text-white border-rose-500">Tue, Jul 1</button>
      <button class="flex-shrink-0 px-3 py-2 rounded-xl border text-sm bg-white border-nude-200 text-charcoal-700">Wed, Jul 2</button>
      <button class="flex-shrink-0 px-3 py-2 rounded-xl border text-sm bg-white border-nude-200 text-charcoal-700">Thu, Jul 3</button>
      <button class="flex-shrink-0 px-3 py-2 rounded-xl border text-sm bg-white border-nude-200 text-charcoal-700">Sat, Jul 5</button>
      <button class="flex-shrink-0 px-3 py-2 rounded-xl border text-sm bg-white border-nude-200 text-charcoal-700">Sun, Jul 6</button>
      <button class="flex-shrink-0 px-3 py-2 rounded-xl border text-sm bg-white border-nude-200 text-charcoal-700">Mon, Jul 7</button>
    </div>
  </div>

  <!-- Time slots -->
  <div class="mb-8">
    <h2 class="text-sm font-semibold text-charcoal-700 mb-3">Available Times</h2>
    <div class="grid grid-cols-3 gap-2">
      <button class="px-3 py-2.5 rounded-xl text-sm font-medium border bg-white border-nude-200 text-charcoal-700 hover:border-rose-300">10:00 AM</button>
      <button class="px-3 py-2.5 rounded-xl text-sm font-medium border bg-white border-nude-200 text-charcoal-700 hover:border-rose-300">10:30 AM</button>
      <button class="px-3 py-2.5 rounded-xl text-sm font-medium border bg-white border-nude-200 text-charcoal-700 hover:border-rose-300">11:00 AM</button>
      <button class="px-3 py-2.5 rounded-xl text-sm font-medium border bg-rose-500 text-white border-rose-500">11:30 AM</button>
      <button class="px-3 py-2.5 rounded-xl text-sm font-medium border bg-white border-nude-200 text-charcoal-700 hover:border-rose-300">12:00 PM</button>
      <button class="px-3 py-2.5 rounded-xl text-sm font-medium border bg-white border-nude-200 text-charcoal-400 opacity-40 cursor-not-allowed" disabled>12:30 PM</button>
      <button class="px-3 py-2.5 rounded-xl text-sm font-medium border bg-white border-nude-200 text-charcoal-700 hover:border-rose-300">01:00 PM</button>
      <button class="px-3 py-2.5 rounded-xl text-sm font-medium border bg-white border-nude-200 text-charcoal-700 hover:border-rose-300">02:00 PM</button>
      <button class="px-3 py-2.5 rounded-xl text-sm font-medium border bg-white border-nude-200 text-charcoal-700 hover:border-rose-300">02:30 PM</button>
      <button class="px-3 py-2.5 rounded-xl text-sm font-medium border bg-white border-nude-200 text-charcoal-700 hover:border-rose-300">03:00 PM</button>
      <button class="px-3 py-2.5 rounded-xl text-sm font-medium border bg-white border-nude-200 text-charcoal-700 hover:border-rose-300">04:00 PM</button>
      <button class="px-3 py-2.5 rounded-xl text-sm font-medium border bg-white border-nude-200 text-charcoal-700 hover:border-rose-300">05:30 PM</button>
    </div>
    <p class="text-xs text-charcoal-400 mt-3">Slots marked grey are already booked.</p>
  </div>

  <!-- Navigation buttons -->
  <div class="flex gap-3">
    <button class="flex-1 inline-flex items-center justify-center gap-2 px-6 py-3 rounded-full border border-rose-300 text-rose-700 bg-white font-semibold text-sm hover:bg-rose-50 transition-colors">
      Back
    </button>
    <button class="flex-1 inline-flex items-center justify-center gap-2 px-6 py-3 rounded-full bg-rose-500 text-white font-semibold text-sm hover:bg-rose-600 transition-colors">
      Next
    </button>
  </div>
</main>

<!-- Bottom Nav -->
<nav class="fixed bottom-0 inset-x-0 z-40 bg-white/95 backdrop-blur-sm border-t border-nude-100">
  <div class="flex items-center justify-around h-16 max-w-lg mx-auto px-2">
    <a href="#" class="flex flex-col items-center gap-0.5 px-3 py-2 text-charcoal-400"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg><span class="text-[10px]">Home</span></a>
    <a href="#" class="flex flex-col items-center gap-0.5 px-3 py-2 text-charcoal-400"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="6" cy="6" r="3"/><circle cx="6" cy="18" r="3"/><path stroke-linecap="round" d="M20 4L8.12 15.88M14.47 14.48L20 20"/></svg><span class="text-[10px]">Services</span></a>
    <a href="#" class="flex flex-col items-center gap-0.5 px-3 py-2 text-rose-500"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="4" width="18" height="18" rx="2" fill="#f43f5e" fill-opacity="0.15"/><path stroke-linecap="round" d="M16 2v4M8 2v4M3 10h18"/></svg><span class="text-[10px] text-rose-500">Bookings</span></a>
    <a href="#" class="flex flex-col items-center gap-0.5 px-3 py-2 text-charcoal-400"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="8" r="4"/><path stroke-linecap="round" d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg><span class="text-[10px]">Profile</span></a>
  </div>
</nav>

</body>
</html>
